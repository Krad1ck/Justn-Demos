/* --------- HELPERS --------- */
const fmt = (n) => n == null ? "—" : n.toLocaleString("en-NZ", { style: "currency", currency: "NZD", maximumFractionDigits: 0 });
const fmtLimit = (n) => (n >= 1000000 ? `$${n / 1000000}M` : `$${(n / 1000).toFixed(0)}k`);
const fmtDate = (d) => d.toLocaleDateString("en-NZ", { day: "2-digit", month: "short", year: "numeric" });
const daysBetween = (a, b) => Math.ceil((b - a) / (1000 * 60 * 60 * 24));
const relTime = (d) => {
  const mins = Math.floor((TODAY.getTime() - d.getTime()) / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  if (months < 12) return `${months}mo ago`;
  return `${Math.floor(months / 12)}y ago`;
};

/* --------- SHARED UI --------- */
function PillButton({ children, onClick, variant = "primary", icon: Icon = ArrowRight, iconPosition = "right", disabled = false, className = "", type = "button" }) {
  const variants = {
    primary: { bg: C.ink, fg: "white", border: C.ink },
    secondary: { bg: "white", fg: C.ink, border: C.ink },
    ghost: { bg: "transparent", fg: C.ink, border: C.ink },
  };
  const v = variants[variant];
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      className={`group inline-flex items-center justify-center gap-3 rounded-full px-6 py-4 font-semibold transition-all active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed ${className}`}
      style={{ backgroundColor: v.bg, color: v.fg, border: `1.5px solid ${v.border}` }}
    >
      {Icon && iconPosition === "left" && <Icon size={18} strokeWidth={2.5} />}
      <span>{children}</span>
      {Icon && iconPosition === "right" && (
        <span
          className="flex h-7 w-7 items-center justify-center rounded-full transition-transform group-hover:translate-x-0.5"
          style={{
            backgroundColor: variant === "primary" ? "white" : C.ink,
            color: variant === "primary" ? C.ink : "white",
          }}
        >
          <Icon size={14} strokeWidth={3} />
        </span>
      )}
    </button>
  );
}

function StatusPill({ children, bg = C.mint, fg = C.ink }) {

    </span>
  );
}

function Field({ label, children, hint, required }) {
  return (
    <label className="block">

        <span className="text-sm font-semibold" style={{ color: C.ink }}>

        </span>
        {hint && <span className="text-xs opacity-60" style={{ color: C.ink }}>{hint}</span>}
      </div>
      {children}
    </label>
  );
}

function TextInput({ value, onChange, placeholder, type = "text", readOnly, ...rest }) {
  return (
    <input

      value={value || ""}
      onChange={(e) => onChange?.(e.target.value)}

      readOnly={readOnly}
      className="w-full rounded-2xl border bg-white px-4 py-3.5 text-base font-medium outline-none transition-all focus:border-current"
      style={{ borderColor: C.hairline, color: C.ink, opacity: readOnly ? 0.7 : 1 }}
      {...rest}
    />
  );
}

function SelectInput({ value, onChange, options, placeholder = "Select…" }) {
  return (
    <div className="relative">
      <select
        value={value || ""}
        onChange={(e) => onChange(e.target.value)}
        className="w-full appearance-none rounded-2xl border bg-white px-4 py-3.5 pr-12 text-base font-medium outline-none focus:border-current"
        style={{ borderColor: C.hairline, color: value ? C.ink : "#9aa5a3" }}

        <option value="" disabled>{placeholder}</option>
        {options.map((o) => (
          <option key={o.value} value={o.value}>{o.label}</option>

   ========================================================= */
function DocsScreen({ onShowNotifications, onShowSettings, onDownload }) {
  const [filter, setFilter] = useState("all");
  const filtered = useMemo(() => {
    if (filter === "all") return DOCUMENTS;
    if (filter === "current") return DOCUMENTS.filter((d) => d.policyId === ACTIVE_POLICY.id);
    return DOCUMENTS.filter((d) => d.type === filter);
  }, [filter]);

  const groups = useMemo(() => {
    const out = {};
    filtered.forEach((d) => {
      const key = d.policyId === ACTIVE_POLICY.id ? `${ACTIVE_POLICY.id} · Current term` : `${d.policyId} · Past term`;
      out[key] = out[key] || [];
      out[key].push(d);
    });
    return out;
  }, [filtered]);

  return (
    <div className="min-h-screen pb-24" style={{ backgroundColor: C.cream }}>
      <TopBar onNotifications={onShowNotifications} onSettings={onShowSettings} />
      <div className="mx-auto max-w-md px-5">
        <Eyebrow>{filtered.length} files</Eyebrow>
        <H1 className="mt-1">Documents</H1>
        <p className="mt-2 text-sm" style={{ color: C.ink, opacity: 0.7 }}>
          Everything for your records — and to send to clients when they ask for proof.
        </p>

        {/* Filter chips */}
        <div className="mt-5 flex flex-wrap gap-2">
          {[
            { id: "all", label: "All" },
            { id: "current", label: "Current term" },
            { id: "Schedule", label: "Schedules" },
            { id: "Certificate", label: "Certificates" },
            { id: "Invoice", label: "Invoices" },
            { id: "Wording", label: "Wordings" },
          ].map((f) => {
            const active = filter === f.id;
            return (
              <button
                key={f.id}
                onClick={() => setFilter(f.id)}
                className="rounded-full px-3.5 py-1.5 text-xs font-bold transition-all"
                style={{
                  backgroundColor: active ? C.ink : "white",
                  color: active ? "white" : C.ink,
                  border: `1px solid ${active ? C.ink : C.hairline}`,
                }}
              >
                {f.label}
              </button>
            );
          })}
        </div>

        {/* Groups */}
        <div className="mt-6 space-y-6">
          {Object.entries(groups).map(([title, docs]) => (
            <div key={title}>
              <p className="text-xs font-bold mb-2" style={{ color: C.ink, opacity: 0.6 }}>{title}</p>
              <div className="space-y-2">
                {docs.map((d) => (
                  <DocRow key={d.id} doc={d} onDownload={() => onDownload(d.name)} />
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

        <div className="mt-5 space-y-3">
          {items.map((n, i) => {
            const Icon = n.icon;
            return (
              <div key={i} className="flex gap-3 rounded-2xl p-3" style={{ backgroundColor: C.bg }}>
                <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full" style={{ backgroundColor: n.color }}>
                  <Icon size={16} style={{ color: C.ink }} />
                </div>
                <div className="min-w-0 flex-1">
                  <p className="text-sm font-bold" style={{ color: C.ink }}>{n.title}</p>
                  <p className="text-xs" style={{ color: C.ink, opacity: 0.7 }}>{n.body}</p>
                  <p className="mt-1 text-[10px] font-bold uppercase tracking-wider" style={{ color: C.ink, opacity: 0.5 }}>{relTime(n.at)}</p>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   TOAST
   ========================================================= */
function Toast({ message, onClose }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 2800);
    return () => clearTimeout(t);
  }, [message, onClose]);
  if (!message) return null;
  return (
    <div className="fixed left-1/2 top-6 z-50 -translate-x-1/2 rounded-full px-5 py-3 shadow-xl" style={{ backgroundColor: C.ink }}>
      <p className="text-sm font-bold text-white">{message}</p>
    </div>
  );
}

/* =========================================================
   MAIN APP
   ========================================================= */
export default function App() {
  const [screen, setScreen] = useState("login");
  const [tab, setTab] = useState("home");
  const [policyDetailId, setPolicyDetailId] = useState(null);
  const [endorsementField, setEndorsementField] = useState(null);
  const [customer, setCustomer] = useState(CUSTOMER);
  const [tickets, setTickets] = useState([]);
  const [showNotifs, setShowNotifs] = useState(false);
  const [toast, setToast] = useState("");

  const handleLogin = () => {
    setScreen("portal");
    setTab("home");
  };

  const handleLogout = () => setScreen("login");

  const goTab = (id) => { setTab(id); setScreen("portal"); };

  const acceptRenewal = () => setScreen("renewal-review");

  const submitRequest = (req) => {
    const id = `REQ-${new Date().getFullYear()}-${String(tickets.length + 1).padStart(4, "0")}`;
    setTickets([{ id, status: "Open", createdAt: TODAY, ...req }, ...tickets]);
    setScreen("portal");
    setTab("help");
    setToast(`✓ ${req.kind === "Claim" ? "Claim notification" : req.kind === "Endorsement" ? "Change request" : "Message"} submitted (${id})`);
  };

  const handleDownload = (file) => setToast(`📥 Downloading ${file}…`);

  /* Routing */
  let body;
  if (screen === "login") {
    body = <Login onLogin={handleLogin} />;
  } else if (screen === "renewal-review") {
    body = <RenewalReview onAccept={() => setScreen("renewal-pay")} onClose={() => setScreen("portal")} />;
  } else if (screen === "renewal-pay") {
    body = <RenewalPay onComplete={() => setScreen("renewal-done")} onBack={() => setScreen("renewal-review")} />;
  } else if (screen === "renewal-done") {
    body = <RenewalSuccess onClose={() => { setScreen("portal"); setTab("home"); }} />;
  } else if (screen === "claim") {
    body = <ClaimForm onSubmit={submitRequest} onBack={() => setScreen("portal")} />;
  } else if (screen === "support") {
    body = <SupportForm onSubmit={submitRequest} onBack={() => setScreen("portal")} />;
  } else if (screen === "endorsement") {
    body = <EndorsementRequest field={endorsementField} onSubmit={submitRequest} onBack={() => setScreen("portal")} />;
  } else if (screen === "policy-detail") {
    body = (
      <PolicyDetailScreen
        policyId={policyDetailId}
        onBack={() => { setScreen("portal"); setTab("policies"); }}
        onDocs={() => { setScreen("portal"); setTab("docs"); }}
        onRequestChange={() => { setScreen("portal"); setTab("profile"); }}
      />
    );
  } else {
    // portal with bottom nav
    if (tab === "home") {
      body = (
        <HomeScreen
          onNavigate={goTab}
          onAcceptRenewal={acceptRenewal}
          onPolicyDetail={(id) => { setPolicyDetailId(id); setScreen("policy-detail"); }}
          onClaimStart={() => setScreen("claim")}
          onSupportStart={() => setScreen("support")}
          onShowNotifications={() => setShowNotifs(true)}
          onShowSettings={() => goTab("profile")}
        />
      );
    } else if (tab === "policies") {
      body = (
        <PoliciesScreen
          onPolicyDetail={(id) => { setPolicyDetailId(id); setScreen("policy-detail"); }}
          onShowNotifications={() => setShowNotifs(true)}
          onShowSettings={() => goTab("profile")}
        />
      );
    } else if (tab === "docs") {
      body = (
        <DocsScreen
          onShowNotifications={() => setShowNotifs(true)}
          onShowSettings={() => goTab("profile")}
          onDownload={handleDownload}
        />
      );
    } else if (tab === "profile") {
      body = (
        <ProfileScreen
          customer={customer}
          setCustomer={setCustomer}
          onSave={() => setToast("✓ Changes saved")}
          onRequestEndorsement={(key, label, value) => { setEndorsementField({ key, label, value }); setScreen("endorsement"); }}
          onShowNotifications={() => setShowNotifs(true)}
          onShowSettings={() => {}}
          onLogout={handleLogout}
        />
      );
    } else if (tab === "help") {
      body = (
        <HelpScreen
          onShowNotifications={() => setShowNotifs(true)}
          onShowSettings={() => goTab("profile")}
          onClaimStart={() => setScreen("claim")}
          onSupportStart={() => setScreen("support")}
          tickets={tickets}
        />
      );
    }
  }

  const showBottomNav = screen === "portal";
  const badges = {
    home: RENEWAL ? 1 : 0,
    help: tickets.length,
  };

  return (
    <div className="min-h-screen" style={{ fontFamily: "Manrope, sans-serif", color: C.ink }}>
      {/* Google fonts */}
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="" />
      <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
      {body}
      {showBottomNav && <BottomNav active={tab} onChange={goTab} badges={badges} />}
      <NotificationsSheet open={showNotifs} onClose={() => setShowNotifs(false)} />
      <Toast message={toast} onClose={() => setToast("")} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
