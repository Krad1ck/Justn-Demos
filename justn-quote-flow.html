/* --------- RULES ENGINE ---------
   Returns { decision: 'price' | 'refer' | 'decline', reasons: [] }
*/
function evaluate(data) {
  const reasons = [];
  let decision = "price";

  const occ = OCCUPATIONS.find((o) => o.code === data.occupation);
  if (occ?.decline) {
    return {
      decision: "decline",
      reasons: [
        {
          code: "OCC_OUT_OF_APPETITE",
          message: `${occ.label} is outside our current contractor scheme appetite.`,
        },
      ],
    };
  }
  if (occ?.refer) {
    decision = "refer";
    reasons.push({
      code: "OCC_REFER",
      message: `${occ.label} requires manual underwriting review.`,
    });
  }

  const rev = REVENUE_BANDS.find((r) => r.id === data.revenueBand);
  if (rev?.refer) {
    decision = "refer";
    reasons.push({
      code: "REV_OVER_2M",
      message: "Annual revenue over $2M needs manual review for appropriate terms.",
    });
  }

  if (data.priorClaims) {
    decision = "refer";
    reasons.push({
      code: "PRIOR_CLAIMS",
      message: "Prior claims or known circumstances require underwriter review.",
    });
  }

  if (data.overseasWork && (data.overseasJurisdictions || []).some((j) => ["US", "Canada"].includes(j))) {
    decision = "refer";
    reasons.push({
      code: "JUR_NORTH_AMERICA",
      message: "Work in US or Canada requires referral due to elevated jurisdictional risk.",
    });
  }

  if (data.subcontractors && !data.subcontractorAgreements) {
    decision = "refer";
    reasons.push({
      code: "SUBBIES_NO_AGREEMENT",
      message: "Subcontractor use without written agreements requires review.",
    });
  }

  return { decision, reasons };
}

/* --------- RATING ENGINE ---------
   Simple multiplier-based rating. Replace with real tables in build.
*/
function rate(data) {
  const occ = OCCUPATIONS.find((o) => o.code === data.occupation);
  const rev = REVENUE_BANDS.find((r) => r.id === data.revenueBand);
  if (!occ || !rev) return null;

  const occMult = occ.mult || 1;
  const revMult = rev.mult || 1;

  const lines = (data.selectedCovers || []).map((id) => {
    const cover = COVERS.find((c) => c.id === id);
    const limit = data.limits?.[id] ?? cover.defaultLimit;
    const excess = data.excesses?.[id] ?? cover.defaultExcess;
    const limitMult = 0.85 + Math.log10(limit / 250000 + 1) * 0.55;
    const excessMult = excess <= 1000 ? 1.1 : excess <= 2500 ? 1.0 : 0.92;
    const subbieLoad = data.subcontractors ? 1.08 : 1.0;
    const overseasLoad = data.overseasWork ? 1.12 : 1.0;
    const premium = Math.round(
      cover.base * occMult * revMult * limitMult * excessMult * subbieLoad * overseasLoad
    );
    return { id, name: cover.name, limit, excess, premium };
  });

  const subtotal = lines.reduce((a, l) => a + l.premium, 0);
  const bundleDiscount = (data.selectedCovers || []).length === 3 ? Math.round(subtotal * 0.1) : 0;
  const adminFee = 25;
  const fapLevy = Math.round((subtotal - bundleDiscount) * 0.005); // simulated regulatory levy
  const net = subtotal - bundleDiscount + adminFee + fapLevy;
  const gst = Math.round(net * 0.15);
  const total = net + gst;

  return { lines, subtotal, bundleDiscount, adminFee, fapLevy, gst, total };
}

/* --- Limits & excess --- */
function LimitsStep({ data, setData, onNext, onBack, onMenu }) {
  const update = (k, v) => setData({ ...data, [k]: v });
  const limits = data.limits || {};
  const excesses = data.excesses || {};

  // initialise defaults on first render
  useEffect(() => {
    const newLimits = { ...limits };
    const newExcesses = { ...excesses };
    let changed = false;
    (data.selectedCovers || []).forEach((id) => {
      const c = COVERS.find((x) => x.id === id);
      if (newLimits[id] == null) { newLimits[id] = c.defaultLimit; changed = true; }
      if (newExcesses[id] == null) { newExcesses[id] = c.defaultExcess; changed = true; }
    });
    if (changed) setData({ ...data, limits: newLimits, excesses: newExcesses });
    // eslint-disable-next-line
  }, []);

  return (
    <div className="min-h-full" style={{ backgroundColor: C.cream }}>
      <TopBar onBack={onBack} onMenu={onMenu} step={3} totalSteps={5} />

            fontVariationSettings: "'SOFT' 100",

        </h2>
        <p className="mt-3 text-base" style={{ color: C.ink, opacity: 0.75 }}>
          Government and enterprise contracts often require $1M+. Pick what fits your contracts.
        </p>

        <div className="mt-7 space-y-6">
          {(data.selectedCovers || []).map((id) => {
            const c = COVERS.find((x) => x.id === id);
            return (
              <div key={id} className="rounded-3xl p-5" style={{ backgroundColor: c.chip }}>
                <p
                  className="text-xl leading-tight"

                >
                  {c.name}
                </p>
                <p className="mt-3 text-xs font-bold uppercase tracking-wider" style={{ color: C.ink, opacity: 0.7 }}>
                  Cover limit

                <div className="mt-2 flex flex-wrap gap-2">
                  {c.limits.map((lim) => (
                    <Chip
                      key={lim}
                      color={limits[id] === lim ? C.ink : "white"}

                      <span style={{ color: limits[id] === lim ? "white" : C.ink }}>{fmtLimit(lim)}</span>

                      <span style={{ color: excesses[id] === ex ? "white" : C.ink }}>{fmt(ex)}</span>

/* --- Payment --- */
function Payment({ data, quote, onNext, onBack, onMenu }) {
  const [card, setCard] = useState({ number: "4242 4242 4242 4242", exp: "12/28", cvv: "123", name: data.contactName || "" });
  const [processing, setProcessing] = useState(false);
  const valid = card.number && card.exp && card.cvv && card.name;

  const submit = () => {
    setProcessing(true);
    setTimeout(onNext, 1800);
  };

  return (
    <div className="min-h-full" style={{ backgroundColor: C.cream }}>
      <TopBar onBack={onBack} onMenu={onMenu} />
      <div className="mx-auto max-w-md px-5 pb-32">
        <p className="text-xs font-bold uppercase tracking-widest" style={{ color: C.ink, opacity: 0.55 }}>
          Payment
        </p>
        <h2
          className="mt-2 leading-tight tracking-tight"
          style={{
            fontFamily: "Fraunces, serif",
            fontWeight: 900,
            fontSize: "clamp(32px, 8vw, 40px)",
            color: C.ink,
            fontVariationSettings: "'SOFT' 100",
          }}
        >
          Pay {fmt(quote.total)}
        </h2>
        <p className="mt-3 text-base" style={{ color: C.ink, opacity: 0.75 }}>
          Secured by Stripe. Card details aren't stored on our system.
        </p>

        <div className="mt-7 space-y-4">
          <Field label="Card number" required>
            <TextInput value={card.number} onChange={(v) => setCard({ ...card, number: v })} placeholder="1234 5678 9012 3456" />
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Expiry" required>
              <TextInput value={card.exp} onChange={(v) => setCard({ ...card, exp: v })} placeholder="MM/YY" />
            </Field>
            <Field label="CVV" required>
              <TextInput value={card.cvv} onChange={(v) => setCard({ ...card, cvv: v })} placeholder="123" />
            </Field>
          </div>
          <Field label="Name on card" required>
            <TextInput value={card.name} onChange={(v) => setCard({ ...card, name: v })} placeholder="As shown on card" />
          </Field>
        </div>

        <div
          className="mt-6 flex items-center gap-2 rounded-2xl p-4"
          style={{ backgroundColor: "white", border: `1px solid ${C.hairline}` }}
        >
          <Lock size={16} style={{ color: C.ink, opacity: 0.7 }} />
          <p className="text-xs font-medium" style={{ color: C.ink, opacity: 0.8 }}>
            Demo only · No real card will be charged
          </p>
        </div>
      </div>

      <StickyCTA>
        <PillButton
          onClick={submit}
          disabled={!valid || processing}
          className="w-full"
          icon={processing ? Loader2 : ArrowRight}
        >
          {processing ? "Processing payment…" : `Pay ${fmt(quote.total)} & bind cover`}
        </PillButton>
      </StickyCTA>
    </div>
  );
}

    { id: "business", label: "Business details" },
    { id: "risk", label: "Risk profile" },

  return (
    <div className="fixed inset-0 z-50">
      <div className="absolute inset-0 bg-black/50" onClick={onClose} />

        className="absolute right-0 top-0 h-full w-80 max-w-[85vw] p-6"

      >

          <Logo className="h-8" />

            <button onClick={() => setOpen(false)} className="text-xs font-bold underline" style={{ color: C.ink }}>Close</button>

          <div className="mt-4 space-y-2">

/* --- Toast --- */
function Toast({ message, onClose }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 2500);
    return () => clearTimeout(t);
  }, [message, onClose]);
  if (!message) return null;
  return (
    <div className="fixed left-1/2 top-6 z-50 -translate-x-1/2 rounded-full px-5 py-3 shadow-lg" style={{ backgroundColor: C.ink }}>
      <p className="text-sm font-bold text-white">{message}</p>
    </div>
  );
}

/* =========================================================
   MAIN APP
   ========================================================= */
export default function App() {
  const [step, setStep] = useState("landing");
  const [data, setData] = useState({});
  const [quote, setQuote] = useState(null);
  const [referralReasons, setReferralReasons] = useState([]);
  const [declineReasons, setDeclineReasons] = useState([]);
  const [menuOpen, setMenuOpen] = useState(false);
  const [toast, setToast] = useState("");

  const goCalculate = () => {
    setStep("calculating");
  };

  const completeCalculation = () => {
    const result = evaluate(data);
    if (result.decision === "decline") {
      setDeclineReasons(result.reasons);
      setStep("decline");
      return;
    }
    if (result.decision === "refer") {
      setReferralReasons(result.reasons);
      setStep("referral");
      return;
    }
    const q = rate(data);
    setQuote(q);
    setStep("quote");
  };

  const reset = () => {
    setStep("landing");
    setData({});
    setQuote(null);
    setReferralReasons([]);
    setDeclineReasons([]);
  };

  const loadScenario = (id) => {
    const base = {
      selectedCovers: ["pi", "pl", "sl"],
      legalName: "Pacific Code Ltd",
      tradingName: "Pacific Code",
      nzbn: "9429046123456",
      entityType: "Limited company",
      contactName: "Alex Tane",
      email: "alex@pacificcode.co.nz",
      mobile: "021 555 1234",
      occupation: "IT-DEV",
      servicesDescription: "Building and maintaining web applications for NZ government and enterprise clients, mainly React + AWS.",
      yearsBand: "3 – 5 years",
      revenueBand: "r2",
      employeeBand: "Just me",
      subcontractors: false,
      overseasWork: false,
      priorClaims: false,
    };

    const scenarios = {
      happy: base,
      "refer-rev": { ...base, revenueBand: "r6" },
      "refer-occ": { ...base, occupation: "CONST-PM" },
      "refer-claims": { ...base, priorClaims: true },
      "refer-us": { ...base, overseasWork: true, overseasJurisdictions: ["US"] },
      decline: { ...base, occupation: "FIN-ADV" },
    };
    setData(scenarios[id]);
    setStep("calculating");
  };

  const screen = (() => {
    switch (step) {
      case "landing":
        return <Landing onStart={() => setStep("covers")} onMenu={() => setMenuOpen(true)} />;
      case "covers":
        return (
          <CoverSelect
            data={data}
            setData={setData}
            onNext={() => setStep("business")}
            onBack={() => setStep("landing")}
            onMenu={() => setMenuOpen(true)}
          />
        );
      case "business":
        return (
          <BusinessStep
            data={data}
            setData={setData}
            onNext={() => setStep("risk")}
            onBack={() => setStep("covers")}
            onMenu={() => setMenuOpen(true)}
          />
        );
      case "risk":
        return (
          <RiskStep
            data={data}
            setData={setData}
            onNext={() => setStep("limits")}
            onBack={() => setStep("business")}
            onMenu={() => setMenuOpen(true)}
          />
        );
      case "limits":
        return (
          <LimitsStep
            data={data}
            setData={setData}
            onNext={goCalculate}
            onBack={() => setStep("risk")}
            onMenu={() => setMenuOpen(true)}
          />
        );
      case "calculating":
        return <Calculating onComplete={completeCalculation} />;
      case "quote":
        return (
          <QuoteResult
            data={data}
            quote={quote}
            onNext={() => setStep("declarations")}
            onBack={() => setStep("limits")}
            onMenu={() => setMenuOpen(true)}
            onSave={() => setToast(`Quote emailed to ${data.email}`)}
          />
        );
      case "referral":
        return (
          <Referral
            reasons={referralReasons}
            data={data}
            onBack={() => setStep("limits")}
            onMenu={() => setMenuOpen(true)}
            onHome={reset}
          />
        );
      case "decline":
        return (
          <Decline
            reasons={declineReasons}
            onBack={() => setStep("limits")}
            onMenu={() => setMenuOpen(true)}
            onHome={reset}
          />
        );
      case "declarations":
        return (
          <Declarations
            data={data}
            setData={setData}
            onNext={() => setStep("payment")}
            onBack={() => setStep("quote")}
            onMenu={() => setMenuOpen(true)}
          />
        );
      case "payment":
        return (
          <Payment
            data={data}
            quote={quote}
            onNext={() => setStep("confirmation")}
            onBack={() => setStep("declarations")}
            onMenu={() => setMenuOpen(true)}
          />
        );
      case "confirmation":
        return (
          <Confirmation
            data={data}
            quote={quote}
            onMenu={() => setMenuOpen(true)}
            onHome={reset}
          />
        );
      default:
        return null;
    }
  })();

  return (
    <div className="min-h-screen" style={{ fontFamily: "Manrope, sans-serif", color: C.ink }}>
      {/* Google fonts */}
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="" />
      <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
      {screen}
      <SideMenu
        open={menuOpen}
        onClose={() => setMenuOpen(false)}
        onJump={(id) => {
          if (id === "quote" && !quote) {
            setToast("Complete the form first to see a quote");
            return;
          }
          setStep(id);
        }}
        currentStep={step}
      />
      <DemoControls onScenario={loadScenario} onReset={reset} currentStep={step} />
      <Toast message={toast} onClose={() => setToast("")} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
