/* --------- HELPERS --------- */
const fmt = (n) => n == null ? "—" : n.toLocaleString("en-NZ", { style: "currency", currency: "NZD", maximumFractionDigits: 0 });
const fmtDate = (d) => d.toLocaleDateString("en-NZ", { day: "2-digit", month: "short", year: "numeric" });
const fmtDateTime = (d) => d.toLocaleString("en-NZ", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
const relTime = (d) => {
  const mins = Math.floor((TODAY.getTime() - d.getTime()) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  return `${months}mo ago`;
};
const waitTime = (mins) => {
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  const days = Math.floor(hrs / 24);
  return `${days}d ${hrs % 24}h`;
};

/* --------- SHARED PRIMITIVES --------- */
function StatusPill({ label, scheme = QUOTE_STATUS, size = "md" }) {
  const conf = scheme[label] || { color: C.ink, bg: "#E5E7EB" };
  const sz = size === "sm" ? "text-[11px] px-2 py-0.5" : "text-xs px-2.5 py-1";
  return (
    <span
      className={`inline-flex items-center gap-1.5 rounded-full font-bold uppercase tracking-wider ${sz}`}
      style={{ backgroundColor: conf.bg, color: conf.color }}
    >
      {label}
    </span>
  );
}

function Button({ children, onClick, variant = "primary", icon: Icon, size = "md", className = "", disabled = false, type = "button" }) {
  const variants = {
    primary: { bg: C.ink, fg: "white", border: C.ink },
    secondary: { bg: "white", fg: C.ink, border: C.hairline },
    ghost: { bg: "transparent", fg: C.ink, border: "transparent" },
    danger: { bg: C.orange, fg: "white", border: C.orange },
    success: { bg: C.mintDeep, fg: "white", border: C.mintDeep },
  };
  const v = variants[variant];
  const sizes = {
    sm: "px-3 py-1.5 text-xs",
    md: "px-4 py-2.5 text-sm",
    lg: "px-5 py-3 text-base",
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      className={`inline-flex items-center justify-center gap-2 rounded-full font-semibold transition-all active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed ${sizes[size]} ${className}`}
      style={{ backgroundColor: v.bg, color: v.fg, border: `1px solid ${v.border}` }}
    >
      {Icon && <Icon size={size === "sm" ? 14 : 16} strokeWidth={2.5} />}
      {children}
    </button>
  );
}

function IconButton({ icon: Icon, onClick, label, className = "" }) {
  return (
    <button
      onClick={onClick}
      aria-label={label}

/* =========================================================

function Policies({ search }) {
  const [statusFilter, setStatusFilter] = useState("All");
  const filtered = useMemo(() => {
    let list = SAMPLE_POLICIES;
    if (statusFilter !== "All") list = list.filter((p) => p.status === statusFilter);
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(
        (p) =>
          p.id.toLowerCase().includes(s) ||
          p.insured.toLowerCase().includes(s) ||
          (p.nzbn || "").includes(s)
      );
    }
    return list;
  }, [statusFilter, search]);

  const statuses = ["All", "Active", "Endorsed", "Pending Cancellation", "Cancelled", "Expired"];
  const totalGwp = filtered.reduce((a, p) => a + p.premium, 0);

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap items-end justify-between gap-3">
        <div>
          <Eyebrow>{filtered.length} policies · GWP {fmt(totalGwp)}</Eyebrow>

          <Button variant="secondary" icon={Download} size="sm">Export CSV</Button>

            <button
              key={s}

              className="rounded-full px-3.5 py-1.5 text-xs font-bold transition-all"
              style={{
                backgroundColor: active ? C.ink : "white",
                color: active ? "white" : C.ink,
                border: `1px solid ${active ? C.ink : C.hairline}`,

              {s}

                <span className="ml-1.5 opacity-60">

function Referrals({ onOpenReferral }) {
  const [sort, setSort] = useState("oldest");
  const sorted = useMemo(() => {
    const list = [...SAMPLE_REFERRALS];
    list.sort((a, b) => sort === "oldest" ? b.waitingMinutes - a.waitingMinutes : a.waitingMinutes - b.waitingMinutes);
    return list;
  }, [sort]);

  const overSla = SAMPLE_REFERRALS.filter((r) => r.waitingMinutes > 1440).length;

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap items-end justify-between gap-3">
        <div>
          <Eyebrow>Underwriting queue</Eyebrow>
          <H1>Referrals</H1>
          <p className="mt-2 text-sm" style={{ color: C.ink, opacity: 0.7 }}>
            <span className="font-bold" style={{ color: C.ink, opacity: 1 }}>{SAMPLE_REFERRALS.length} waiting</span> · <span className="font-bold" style={{ color: C.orange }}>{overSla} over 24h SLA</span>
          </p>
        </div>
        <div className="flex gap-2">
          <Button
            variant="secondary"
            size="sm"
            onClick={() => setSort(sort === "oldest" ? "newest" : "oldest")}
            icon={Filter}

            Sort: {sort === "oldest" ? "Oldest first" : "Newest first"}

        </div>
      </div>

      <div className="space-y-3">
        {sorted.map((r) => {
          const overdue = r.waitingMinutes > 1440;
          return (
            <button
              key={r.id}
              onClick={() => onOpenReferral(r.id)}
              className="w-full rounded-2xl bg-white p-5 text-left transition-all hover:scale-[1.005] active:scale-[0.998]"
              style={{ border: `1px solid ${overdue ? C.orange : C.hairline2}`, borderWidth: overdue ? 1.5 : 1 }}
            >
              <div className="flex items-start justify-between gap-4">
                <div className="flex items-start gap-4 min-w-0 flex-1">
                  <div
                    className="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl"
                    style={{ backgroundColor: C.purpleSoft }}
                  >
                    <AlertCircle size={20} style={{ color: C.ink }} />
                  </div>
                  <div className="min-w-0 flex-1">
                    <div className="flex flex-wrap items-center gap-2">
                      <p className="text-base font-black leading-tight" style={{ color: C.ink }}>{r.insured}</p>
                      <span className="text-xs font-mono" style={{ color: C.ink, opacity: 0.5 }}>{r.id}</span>
                      <StatusPill label="Referred" size="sm" />
                    </div>
                    <p className="mt-1 text-xs" style={{ color: C.ink, opacity: 0.65 }}>
                      {r.occupation} · {r.revenue} · {r.employees}
                    </p>
                    <div className="mt-3 flex items-start gap-2">
                      {r.flags.map((f) => (
                        <div
                          key={f.code}

                          style={{ backgroundColor: C.purpleSoft, color: C.ink }}

                          <span className="opacity-90">{f.message}</span>

                      ))}

                  </div>

/* =========================================================
   TOAST
   ========================================================= */
function Toast({ message, onClose }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onClose, 2800);
    return () => clearTimeout(t);
  }, [message, onClose]);
  if (!message) return null;
  return (
    <div className="fixed bottom-6 left-1/2 z-50 -translate-x-1/2 rounded-full px-5 py-3 shadow-xl" style={{ backgroundColor: C.ink }}>
      <p className="text-sm font-bold text-white">{message}</p>
    </div>
  );
}

  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
